spring:
  application:
    name: state-store
  grpc:
    server:
      port: 9090
  data:
    redis:
      host: redis
      port: 6379
      timeout: 1s

management:
  server:
    port: 8081
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  metrics:
    tags:
      application: ${spring.application.name}