syntax = "proto3";

package org.janus.api.statestore;

option java_package = "org.janus.api.statestore";
option java_multiple_files = true;

import "google/protobuf/duration.proto";

message DegradationStateUpdate {
  string degradation_id = 1;
  double value = 2;
  google.protobuf.Duration ttl = 3;
}