syntax = "proto3";

package org.janus.api.statestore;

option java_package = "org.janus.api.statestore";
option java_multiple_files = true;

import "google/protobuf/empty.proto";
import "google/protobuf/duration.proto";

message GetDegradationStatesRequest {
  repeated string degradation_ids = 1;
}

message GetDegradationStatesResponse {
  repeated DegradationState degradation_states = 1;
}

message UpdateDegradationStatesRequest {
  DegradationStateUpdateSource source = 1;
  repeated DegradationStateUpdate updates = 2;
}

enum DegradationStateUpdateSource {
  ADMIN_UI = 0;
  DECIDER = 1;
}

message DegradationStateUpdate {
  string degradation_id = 1;
  double value = 2;
  google.protobuf.Duration ttl = 3;
}

message DegradationState {
  string degradation_id = 1;
  double value = 2;
}

service StateStoreService {
  rpc GetDegradationStates(GetDegradationStatesRequest) returns (GetDegradationStatesResponse);
  rpc GetDegradationStatesWithAllSources(GetDegradationStatesRequest) returns (GetDegradationStatesResponse);
  rpc UpdateDegradationStates(UpdateDegradationStatesRequest) returns (google.protobuf.Empty);
}
