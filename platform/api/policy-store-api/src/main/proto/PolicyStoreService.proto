syntax = "proto3";

package org.janus.api.policystore;

import "google/protobuf/duration.proto";

message GetDegradationPoliciesRequest {
  repeated string degradation_ids = 1;
}

message GetDegradationPoliciesResponse {
  repeated DegradationPolicy degradation_policies = 1;
}

message GetDegradationMetadataRequest {
  repeated string degradation_ids = 1;
}

message GetDegradationMetadataResponse {
  repeated DegradationMetadata degradation_metadata = 1;
}

message DegradationPolicy {
  string degradation_id = 1;
  google.protobuf.Duration evaluation_period = 2;//TODO: скопировать в отдельный message для sidecar
  //TODO: информация о метриках/формуле расчёта
}

message DegradationMetadata {
  string degradation_id = 1;
  optional double critical_threshold = 2;
  optional double min_fallback_ratio = 3;
  optional double max_fallback_ratio = 4;
}

service PolicyStoreService {
  rpc GetDegradationPolicies(GetDegradationPoliciesRequest) returns (GetDegradationPoliciesResponse);
  rpc GetDegradationMetadata(GetDegradationMetadataRequest) returns (GetDegradationMetadataResponse);
}
