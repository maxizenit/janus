syntax = "proto3";

package org.janus.api.policystore;

option java_package = "org.janus.api.policystore";
option java_multiple_files = true;

import "google/protobuf/duration.proto";
import "signal_source.proto";

message DegradationPolicy {
  string degradation_id = 1;
  google.protobuf.Duration evaluation_interval = 2;
  optional SignalSource signal_source = 3;
  double critical_threshold = 4;
  double min_fallback_ratio = 5;
  double max_fallback_ratio = 6;
  double fallback_curve_exponent = 7;
}
