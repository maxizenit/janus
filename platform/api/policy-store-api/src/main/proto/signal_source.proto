syntax = "proto3";

package org.janus.api.policystore;

option java_package = "org.janus.api.policystore";
option java_multiple_files = true;

message SignalSource {
  oneof kind {
    DegradationSignal degradation = 1;
    PrometheusMetric prometheus = 2;
  }
}

message DegradationSignal {
  string degradation_id = 1;
}

message PrometheusMetric {
  string metric_reference = 1;
}