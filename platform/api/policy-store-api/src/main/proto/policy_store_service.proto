syntax = "proto3";

package org.janus.api.policystore;

option java_package = "org.janus.api.policystore";
option java_multiple_files = true;

import "google/protobuf/duration.proto";
import "google/protobuf/field_mask.proto";
import "degradation_policy.proto";
import "evaluator_degradation_policy.proto";
import "sidecar_degradation_policy.proto";
import "signal_source.proto";

message GetDegradationPoliciesRequest {
  repeated string degradation_ids = 1;
}

message GetDegradationPoliciesResponse {
  repeated DegradationPolicy degradation_policies = 1;
}

message GetEvaluatorDegradationPoliciesRequest {
  repeated string degradation_ids = 1;
}

message GetEvaluatorDegradationPoliciesResponse {
  repeated EvaluatorDegradationPolicy degradation_policies = 1;
}

message GetSidecarDegradationPoliciesRequest {
  repeated string degradation_ids = 1;
}

message GetSidecarDegradationPoliciesResponse {
  repeated SidecarDegradationPolicy degradation_policies = 1;
}

message CreateDegradationPolicyRequest {
  string degradation_id = 1;
  google.protobuf.Duration evaluation_interval = 2;
  optional SignalSource signal_source = 3;
  optional double critical_threshold = 4;
  optional double min_fallback_ratio = 5;
  optional double max_fallback_ratio = 6;
}

message UpdateDegradationPolicyRequest {
  string degradation_id = 1;
  optional google.protobuf.Duration evaluation_interval = 2;
  optional SignalSource signal_source = 3;
  optional double critical_threshold = 4;
  optional double min_fallback_ratio = 5;
  optional double max_fallback_ratio = 6;

  google.protobuf.FieldMask update_mask = 100;
}

message DeleteDegradationPolicyRequest {
  string degradation_id = 1;
}

message DeleteDegradationPolicyResponse {
}

service PolicyStoreService {

  rpc GetDegradationPolicies(GetDegradationPoliciesRequest) returns (GetDegradationPoliciesResponse);

  rpc GetEvaluatorDegradationPolicies(GetEvaluatorDegradationPoliciesRequest) returns (GetEvaluatorDegradationPoliciesResponse);

  rpc GetSidecarDegradationPolicies(GetSidecarDegradationPoliciesRequest) returns (GetSidecarDegradationPoliciesResponse);

  rpc CreateDegradationPolicy(CreateDegradationPolicyRequest) returns (DegradationPolicy);

  rpc UpdateDegradationPolicy(UpdateDegradationPolicyRequest) returns (DegradationPolicy);

  rpc DeleteDegradationPolicy(DeleteDegradationPolicyRequest) returns (DeleteDegradationPolicyResponse);
}
