apiVersion: apps/v1
kind: Deployment
metadata:
  name: policy-store
  labels:
    app.kubernetes.io/name: policy-store
    app.kubernetes.io/component: platform
    app.kubernetes.io/part-of: janus
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: policy-store
  template:
    metadata:
      labels:
        app.kubernetes.io/name: policy-store
        app.kubernetes.io/component: platform
        app.kubernetes.io/part-of: janus
    spec:
      containers:
        - name: policy-store
          image: policy-store:local
          imagePullPolicy: IfNotPresent
          ports:
            - name: grpc
              containerPort: 9090
            - name: management
              containerPort: 8081
          readinessProbe:
            httpGet:
              path: /actuator/health
              port: management
            initialDelaySeconds: 15
            periodSeconds: 5
            failureThreshold: 30
          livenessProbe:
            httpGet:
              path: /actuator/health
              port: management
            initialDelaySeconds: 60
            periodSeconds: 15
          resources:
            requests:
              cpu: 200m
              memory: 384Mi
            limits:
              cpu: 1000m
              memory: 768Mi
