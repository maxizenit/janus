apiVersion: apps/v1
kind: Deployment
metadata:
  name: demo-server
  labels:
    app.kubernetes.io/name: demo-server
    app.kubernetes.io/component: demo
    app.kubernetes.io/part-of: janus
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: demo-server
  template:
    metadata:
      labels:
        app.kubernetes.io/name: demo-server
        app.kubernetes.io/component: demo
        app.kubernetes.io/part-of: janus
    spec:
      containers:
        - name: demo-server
          image: server:local
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8090
          readinessProbe:
            httpGet:
              path: /actuator/health
              port: http
            initialDelaySeconds: 15
            periodSeconds: 5
            failureThreshold: 30
          livenessProbe:
            httpGet:
              path: /actuator/health
              port: http
            initialDelaySeconds: 60
            periodSeconds: 15
          resources:
            requests:
              cpu: 200m
              memory: 384Mi
            limits:
              cpu: 1000m
              memory: 768Mi
