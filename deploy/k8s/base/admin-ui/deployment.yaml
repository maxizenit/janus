apiVersion: apps/v1
kind: Deployment
metadata:
  name: admin-ui
  labels:
    app.kubernetes.io/name: admin-ui
    app.kubernetes.io/component: platform
    app.kubernetes.io/part-of: janus
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: admin-ui
  template:
    metadata:
      labels:
        app.kubernetes.io/name: admin-ui
        app.kubernetes.io/component: platform
        app.kubernetes.io/part-of: janus
    spec:
      containers:
        - name: admin-ui
          image: admin-ui:local
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8080
            - name: management
              containerPort: 8081
          readinessProbe:
            httpGet:
              path: /actuator/health
              port: management
            initialDelaySeconds: 20
            periodSeconds: 5
            failureThreshold: 30
          livenessProbe:
            httpGet:
              path: /actuator/health
              port: management
            initialDelaySeconds: 90
            periodSeconds: 15
          resources:
            requests:
              cpu: 200m
              memory: 512Mi
            limits:
              cpu: 1000m
              memory: 1Gi
