apiVersion: v1
kind: Service
metadata:
  name: admin-ui
  labels:
    app.kubernetes.io/name: admin-ui
    app.kubernetes.io/component: platform
    app.kubernetes.io/part-of: janus
spec:
  type: NodePort
  selector:
    app.kubernetes.io/name: admin-ui
  ports:
    - name: http
      port: 8080
      targetPort: 8080
      nodePort: 30080
    - name: management
      port: 8081
      targetPort: 8081
