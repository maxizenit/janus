apiVersion: v1
kind: Service
metadata:
  name: sidecar
  labels:
    app.kubernetes.io/name: sidecar
    app.kubernetes.io/component: client
    app.kubernetes.io/part-of: janus
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: sidecar
  ports:
    - name: grpc
      port: 9090
      targetPort: 9090
    - name: management
      port: 8081
      targetPort: 8081
