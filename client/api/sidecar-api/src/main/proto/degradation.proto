syntax = "proto3";

package org.janus.api.sidecar;

option java_package = "org.janus.api.sidecar";
option java_multiple_files = true;

import "google/protobuf/duration.proto";

message Degradation {
  string degradation_id = 1;
  double value = 2;
  google.protobuf.Duration evaluation_interval = 3;
  optional double critical_threshold = 4;
  optional double min_fallback_ratio = 5;
  optional double max_fallback_ratio = 6;
  optional double fallback_curve_exponent = 7;
  bool stale = 8;
}
