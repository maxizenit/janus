x-java-healthcheck: &java-healthcheck
  interval: 10s
  timeout: 5s
  retries: 5
  start_period: 30s

services:

  # --- Infrastructure ---

  postgres:
    image: postgres:17
    environment:
      POSTGRES_DB: janus-policy-store-db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 3s
      retries: 5

  redis:
    image: redis:7
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  prometheus:
    image: prom/prometheus:latest
    ports:
      - "9090:9090"
    volumes:
      - ./docker/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro

  grafana:
    image: grafana/grafana:latest
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
    volumes:
      - ./docker/grafana/provisioning:/etc/grafana/provisioning:ro
      - grafana-data:/var/lib/grafana

  # --- Platform ---

  policy-store:
    image: policy-store:local
    pull_policy: never
    ports:
      - "8081:8081"
      - "9091:9090"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl --fail --silent localhost:8081/actuator/health | grep UP || exit 1"]
      <<: *java-healthcheck

  state-store:
    image: state-store:local
    pull_policy: never
    ports:
      - "8082:8081"
      - "9092:9090"
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl --fail --silent localhost:8081/actuator/health | grep UP || exit 1"]
      <<: *java-healthcheck

  evaluator:
    image: evaluator:local
    pull_policy: never
    ports:
      - "8083:8081"
    depends_on:
      redis:
        condition: service_healthy
      policy-store:
        condition: service_healthy
      state-store:
        condition: service_healthy
      prometheus:
        condition: service_started
    healthcheck:
      test: ["CMD-SHELL", "curl --fail --silent localhost:8081/actuator/health | grep UP || exit 1"]
      <<: *java-healthcheck

  admin-ui:
    image: admin-ui:local
    pull_policy: never
    ports:
      - "8080:8080"
      - "8085:8081"
    depends_on:
      policy-store:
        condition: service_healthy
      state-store:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl --fail --silent localhost:8081/actuator/health | grep UP || exit 1"]
      <<: *java-healthcheck

  # --- Client ---

  sidecar:
    image: sidecar:local
    pull_policy: never
    ports:
      - "8084:8081"
      - "9094:9090"
    depends_on:
      policy-store:
        condition: service_healthy
      state-store:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl --fail --silent localhost:8081/actuator/health | grep UP || exit 1"]
      <<: *java-healthcheck

  # --- Demo ---

  demo-server:
    image: server:local
    pull_policy: never
    ports:
      - "8090:8090"
    healthcheck:
      test: ["CMD-SHELL", "curl --fail --silent localhost:8090/actuator/health | grep UP || exit 1"]
      <<: *java-healthcheck

  demo-client:
    image: client:local
    pull_policy: never
    ports:
      - "8091:8091"
    environment:
      DEMO_SERVER_URL: http://demo-server:8090
      SPRING_GRPC_CLIENT_CHANNELS_SIDECAR_ADDRESS: sidecar:9090
    depends_on:
      sidecar:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl --fail --silent localhost:8091/actuator/health | grep UP || exit 1"]
      <<: *java-healthcheck

volumes:
  postgres-data:
  grafana-data:
